<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Andrómeda — Desarrollo web a la velocidad de la luz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================
   ANDRÓMEDA — Landing Page
   Cosmic dark theme, violet accents
   ============================================ */

:root {
  --bg: #06030f;
  --bg-2: #0b0716;
  --bg-3: #120a22;
  --ink: #f5f0ff;
  --ink-2: #c9bfe0;
  --ink-3: #8a7fa8;
  --ink-4: #5b536f;
  --line: rgba(180, 160, 230, 0.10);
  --line-2: rgba(180, 160, 230, 0.18);
  --violet: oklch(0.70 0.20 295);
  --violet-2: oklch(0.62 0.24 300);
  --violet-deep: oklch(0.45 0.22 295);
  --violet-soft: oklch(0.85 0.10 295);
  --glow: 168, 85, 247;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: var(--violet); color: #fff; }

h1, h2, h3, h4 {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.02;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

/* ---------- Layout ---------- */
.shell {
  position: relative;
  min-height: 100vh;
  isolation: isolate;
}
.wrap {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ---------- Starfield ---------- */
.starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.starfield canvas { width: 100%; height: 100%; display: block; }

.cosmic-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  opacity: 0.55;
}

/* ---------- Nav ---------- */
.nav {
  position: sticky;
  top: 16px;
  z-index: 50;
  display: flex;
  justify-content: center;
  padding: 0 32px;
}
.nav-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 7px 7px 16px;
  background: rgba(20, 12, 38, 0.55);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.06),
    0 10px 40px rgba(0, 0, 0, 0.4);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 14px;
  margin-right: 6px;
  border-right: 1px solid var(--line-2);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 15px;
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, var(--violet-soft) 30%, var(--violet) 60%, var(--violet-deep) 100%);
  box-shadow: 0 0 12px rgba(var(--glow), 0.6), inset 0 0 8px rgba(255, 255, 255, 0.4);
  flex-shrink: 0;
}
.nav-links { display: flex; gap: 2px; }
.nav-link {
  padding: 9px 16px;
  font-size: 13.5px;
  color: var(--ink-2);
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.nav-link:hover { color: var(--ink); background: rgba(255, 255, 255, 0.04); }
.nav-link.active {
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  color: #fff;
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow: 0 4px 14px rgba(var(--glow), 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.nav-cta {
  margin-left: 8px;
  padding: 9px 18px 9px 18px;
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  color: #fff;
  font-size: 13.5px;
  font-weight: 500;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 999px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 18px rgba(var(--glow), 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  transition: transform 0.15s;
}
.nav-cta:hover { transform: translateY(-1px); }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding: 88px 0 60px;
  text-align: center;
  z-index: 2;
}
.hero-purple-wash {
  position: absolute;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 900px; height: 600px;
  background: radial-gradient(ellipse at center,
    rgba(168, 85, 247, 0.35) 0%,
    rgba(120, 60, 200, 0.15) 35%,
    transparent 70%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -1;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  background: rgba(20, 12, 38, 0.4);
  backdrop-filter: blur(8px);
  margin-bottom: 40px;
}
.eyebrow::before, .eyebrow::after {
  content: "";
  width: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet));
}
.eyebrow::after { background: linear-gradient(90deg, var(--violet), transparent); }
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet);
  box-shadow: 0 0 8px rgba(var(--glow), 0.8);
}
.hero h1 {
  font-size: clamp(48px, 7vw, 88px);
  font-weight: 500;
  max-width: 980px;
  margin: 0 auto;
}
.hero h1 .gradient {
  background: linear-gradient(180deg, #d4b8ff 0%, #a855f7 60%, #6b3fc7 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: italic;
  font-weight: 400;
}
.hero p.lead {
  margin: 28px auto 0;
  max-width: 580px;
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-2);
}
.hero-cta-row {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 40px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 26px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  color: #fff;
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow: 0 8px 28px rgba(var(--glow), 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.22);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(var(--glow), 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.22); }
.btn-ghost {
  background: rgba(255, 255, 255, 0.03);
  color: var(--ink);
  border-color: var(--line-2);
}
.btn-ghost:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(180, 160, 230, 0.3); }

/* ---------- Hero showcase card ---------- */
.showcase {
  margin: 72px auto 0;
  max-width: 1080px;
  display: grid;
  grid-template-columns: 1fr 1.15fr;
  gap: 16px;
  text-align: left;
}
.card {
  background: linear-gradient(180deg, rgba(28, 18, 52, 0.6), rgba(14, 8, 28, 0.6));
  border: 1px solid var(--line-2);
  border-radius: 22px;
  padding: 22px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* shared head for showcase cards */
.sc-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 18px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.sc-head > div:not(.sc-head-icon) { flex: 1; min-width: 0; }
.sc-head-icon {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 10px;
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 14px rgba(var(--glow), 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.sc-head-icon.dim {
  background: rgba(168, 85, 247, 0.15);
  border: 1px solid rgba(168, 85, 247, 0.3);
  color: var(--violet-soft);
  box-shadow: none;
}
.sc-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.005em;
}
.sc-subtitle {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 2px;
  letter-spacing: 0.01em;
}
.sc-subtitle.mono { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; }
.sc-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  background: rgba(80, 220, 180, 0.1);
  border: 1px solid rgba(80, 220, 180, 0.3);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #6ed7b0;
  letter-spacing: 0.05em;
}
.sc-status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #6ed7b0;
  box-shadow: 0 0 6px rgba(110, 215, 176, 0.8);
}

/* Diagnóstico (left) */
.sc-diag {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 480px;
}

/* Arquitectura (right) */
.sc-arch {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 480px;
}
.arch-modules {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.arch-mod {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(10, 6, 22, 0.5);
  border: 1px solid var(--line);
  border-radius: 12px;
  transition: border-color 0.2s;
}
.arch-mod:hover { border-color: var(--line-2); }
.arch-mod-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid rgba(168, 85, 247, 0.2);
  display: grid; place-items: center;
  color: var(--violet-soft);
  flex-shrink: 0;
}
.arch-mod-body { flex: 1; min-width: 0; }
.arch-mod-name {
  font-size: 13.5px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: -0.005em;
}
.arch-mod-tech {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-3);
  margin-top: 3px;
  letter-spacing: 0.01em;
}
.arch-ai-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 9px;
  background: linear-gradient(180deg, rgba(168, 85, 247, 0.25), rgba(80, 40, 160, 0.25));
  border: 1px solid rgba(168, 85, 247, 0.45);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--violet-soft);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}
.arch-ai-tag svg { width: 10px; height: 10px; }

.arch-timeline {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  padding: 14px 4px 4px;
  position: relative;
  border-top: 1px dashed var(--line-2);
  margin-top: 4px;
}
.arch-timeline::before {
  content: "";
  position: absolute;
  top: 28px;
  left: 12%;
  right: 12%;
  height: 1px;
  background: linear-gradient(90deg, var(--violet), var(--violet-deep), var(--line));
  opacity: 0.6;
}
.tl-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
}
.tl-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(168, 85, 247, 0.2);
  border: 1px solid var(--line-2);
  margin-top: 6px;
}
.tl-step.done .tl-dot {
  background: var(--violet-soft);
  border-color: var(--violet-soft);
  box-shadow: 0 0 8px rgba(var(--glow), 0.6);
}
.tl-step.current .tl-dot {
  background: var(--violet);
  border-color: var(--violet);
  box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.18), 0 0 12px rgba(var(--glow), 0.6);
}
.tl-label {
  font-size: 12px;
  color: var(--ink);
  font-weight: 500;
  margin-top: 4px;
}
.tl-step:not(.done):not(.current) .tl-label { color: var(--ink-3); }
.tl-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: 0.02em;
}

/* sc-flow */
.sc-flow {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}
.sc-step {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 14px;
  position: relative;
  padding-bottom: 18px;
}
.sc-step:last-child { padding-bottom: 0; }
.sc-step::before {
  content: "";
  position: absolute;
  left: 15px;
  top: 32px;
  bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, var(--violet) 0%, var(--line) 100%);
  opacity: 0.5;
}
.sc-step:last-child::before { display: none; }

.sc-step-mark {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: rgba(168, 85, 247, 0.12);
  border: 1px solid rgba(168, 85, 247, 0.35);
  color: var(--violet-soft);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.01em;
  z-index: 1;
  flex-shrink: 0;
}
.sc-step-mark.done {
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  border-color: rgba(255, 255, 255, 0.18);
  color: #fff;
  box-shadow: 0 0 14px rgba(var(--glow), 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
}
.sc-step-mark.done svg { width: 13px; height: 13px; }
.sc-step-mark.done path { stroke-width: 2.2; }

.sc-step-body { display: flex; flex-direction: column; gap: 8px; padding-top: 5px; }
.sc-step-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.005em;
}

.sc-bubble {
  padding: 12px 14px;
  background: rgba(10, 6, 22, 0.6);
  border: 1px solid var(--line-2);
  border-radius: 12px;
  border-top-left-radius: 4px;
  position: relative;
}
.sc-bubble p {
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink);
  font-style: italic;
}
.sc-bubble-by {
  display: block;
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}

.sc-process {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  background: rgba(10, 6, 22, 0.6);
  border: 1px solid var(--line-2);
  border-radius: 12px;
}
.sc-actors {
  display: flex;
  align-items: center;
}
.sc-actor {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0;
  border: 2px solid var(--bg);
  flex-shrink: 0;
}
.sc-actor + .sc-actor { margin-left: -8px; }
.sc-actor.sc-eng {
  background: linear-gradient(135deg, #3a2860, #1a1030);
  color: var(--ink);
  border-color: rgba(20, 12, 38, 1);
}
.sc-actor.sc-eng:nth-of-type(2) { background: linear-gradient(135deg, #4a3a78, #2a1a48); }
.sc-actor.sc-eng:nth-of-type(3) { background: linear-gradient(135deg, #2a3a60, #1a1030); }
.sc-actor.sc-ai {
  background: linear-gradient(180deg, var(--violet-2), var(--violet-deep));
  color: #fff;
  box-shadow: 0 0 12px rgba(var(--glow), 0.6);
}
.sc-actor.sc-ai svg { width: 12px; height: 12px; }

.sc-process-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.sc-process-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--violet-soft);
  letter-spacing: 0.02em;
}
.sc-process-tasks {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px 10px;
  font-size: 11.5px;
  color: var(--ink-2);
}
.sc-pip {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ink-4);
  margin-right: 5px;
  vertical-align: 0;
}
.sc-pip.done { background: #6ed7b0; box-shadow: 0 0 6px rgba(110, 215, 176, 0.6); }
.sc-pip.current {
  background: var(--violet);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
  animation: sc-pulse 1.6s ease-in-out infinite;
}
@keyframes sc-pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2); }
  50% { box-shadow: 0 0 0 6px rgba(168, 85, 247, 0); }
}

.sc-proposal {
  padding: 14px;
  background:
    radial-gradient(ellipse at top right, rgba(168, 85, 247, 0.12), transparent 60%),
    rgba(10, 6, 22, 0.7);
  border: 1px solid rgba(168, 85, 247, 0.35);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
}
.sc-proposal-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--ink);
}
.sc-proposal-row svg {
  width: 11px; height: 11px;
  color: var(--violet-soft);
  flex-shrink: 0;
}
.sc-proposal-row path { stroke-width: 2.2; }
.sc-proposal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  font-size: 12px;
  color: var(--ink-2);
}
.sc-proposal-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--violet-soft);
  letter-spacing: 0.08em;
  padding: 3px 8px;
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid rgba(168, 85, 247, 0.25);
  border-radius: 999px;
}

.field-chev {
  width: 14px; height: 14px;
  color: var(--ink-3);
}
.btn-gen {
  margin-top: 4px;
  padding: 13px;
  background: linear-gradient(180deg, rgba(168, 85, 247, 0.25), rgba(80, 40, 160, 0.25));
  border: 1px solid rgba(168, 85, 247, 0.35);
  border-radius: 12px;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-gen:hover { background: linear-gradient(180deg, rgba(168, 85, 247, 0.4), rgba(80, 40, 160, 0.4)); border-color: rgba(168, 85, 247, 0.55); }

/* pills under showcase */
.feature-pills {
  display: inline-flex;
  align-items: center;
  gap: 0;
  padding: 6px 8px;
  margin-top: 36px;
  background: rgba(20, 12, 38, 0.4);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  backdrop-filter: blur(8px);
  font-size: 13px;
  color: var(--ink-2);
}
.feature-pills .pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
}
.feature-pills .sep {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--violet);
  box-shadow: 0 0 6px rgba(var(--glow), 0.6);
}

/* ---------- Section heading ---------- */
.section {
  position: relative;
  padding: 120px 0 40px;
  z-index: 2;
}
.section-eyebrow-row {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}
.section h2 {
  font-size: clamp(36px, 5vw, 60px);
  text-align: center;
  max-width: 880px;
  margin: 0 auto;

// ───────── Starfield ─────────
function Starfield() {
  const ref = useRef(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    let w, h, stars, raf;

    function resize() {
      w = canvas.clientWidth;
      h = canvas.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);
      const count = Math.floor(w * h / 9000);
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.3 + 0.2,
        a: Math.random() * 0.7 + 0.1,
        twinkleSpeed: Math.random() * 0.015 + 0.003,
        phase: Math.random() * Math.PI * 2,
        drift: Math.random() * 0.04 + 0.01
      }));
    }

    let t = 0;
    function draw() {
      t += 1;
      ctx.clearRect(0, 0, w, h);
      for (const s of stars) {
        const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220, 200, 255, ${alpha})`;
        ctx.fill();
        if (s.r > 1.1) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(168, 85, 247, ${alpha * 0.15})`;
          ctx.fill();
        }
        s.y += s.drift;
        if (s.y > h) { s.y = 0; s.x = Math.random() * w; }
      }
      raf = requestAnimationFrame(draw);
    }

    resize();
    draw();
    window.addEventListener('resize', resize);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <div className="starfield">
      <canvas ref={ref} />
      <div className="cosmic-glow" style={{ top: '5%', left: '15%', width: 500, height: 500, background: 'radial-gradient(circle, rgba(168,85,247,0.25), transparent 70%)' }} />
      <div className="cosmic-glow" style={{ top: '40%', right: '0%', width: 600, height: 600, background: 'radial-gradient(circle, rgba(120,60,200,0.18), transparent 70%)' }} />
      <div className="cosmic-glow" style={{ top: '80%', left: '40%', width: 700, height: 700, background: 'radial-gradient(circle, rgba(80,40,160,0.20), transparent 70%)' }} />
    </div>
  );
}

  { name: 'Drizzle ORM', role: 'orm', icon: <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 6l3 5M9 6l3 5M13 11l3 5M17 11l3 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg> },
  { name: 'Vercel', role: 'edge', icon: <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4l9 14H2L11 4z" fill="currentColor" /></svg> },
  { name: 'Cloudflare', role: 'cdn', icon: <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M16 14c2 0 3-1.5 3-3s-1.5-3-3-3c-.3-2-2-3.5-4-3.5-2.5 0-4.5 2-4.5 4.5 0 .2 0 .4.1.6C5.2 9.8 4 11 4 12.5 4 14.5 5.5 16 7.5 16H16z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round" /></svg> },

  { n: '02', t: 'Diseño con propósito', d: 'Prototipos UX/UI validables y arquitectura definida. Lo que se va a construir queda claro antes de escribir código.' },
  { n: '03', t: 'Construcción ágil', d: 'Iteraciones cortas con QA automatizado, code review asistido por IA y demos en vivo. Repositorio tuyo desde el día uno.' },
  { n: '04', t: 'Evolución continua', d: 'Acompañamos el lanzamiento, el monitoreo y las iteraciones siguientes. El software vive y crece contigo.' }
];

function Process() {
  return (
    <section className="section wrap" id="proceso">

      <div className="process">

          <div key={s.n} className="step">

            <p>{s.d}</p>

// ───────── Contact ─────────
const PROJECT_TYPES = [
  'Aplicación web a medida',
  'SaaS / plataforma',
  'Consultoría & arquitectura',
  'Modernización & integraciones',
  'Soporte sobre apps existentes',
  'Otro'
];

function Contact() {
  const [form, setForm] = useState({ name: '', email: '', company: '', type: PROJECT_TYPES[0], message: '' });
  const [sent, setSent] = useState(false);
  const [errors, setErrors] = useState({});

  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

  const submit = (e) => {
    e.preventDefault();
    const errs = {};
    if (!form.name.trim()) errs.name = true;
    if (!/^\S+@\S+\.\S+$/.test(form.email)) errs.email = true;
    if (!form.message.trim()) errs.message = true;
    setErrors(errs);
    if (Object.keys(errs).length) return;
    setSent(true);
  };

  return (
    <section className="section wrap" id="contacto" style={{ padding: "120px 0px 40px" }}>
      <div className="section-eyebrow-row">
        <div className="eyebrow">— Empieza tu misión —</div>
      </div>
      <h2>
        Cuéntanos en qué<br />
        <span className="gradient">estás trabajando.</span>
      </h2>
      <p className="section-sub">
        Te escribimos lo antes posible con una propuesta inicial. No spam, no formularios automáticos: te responde directamente alguien del equipo fundador.
      </p>

      <div className="contact-card card">
        {sent ?
          <div className="contact-success">
            <div className="contact-success-mark"><Icon.check /></div>
            <h3>Mensaje recibido.</h3>
            <p>
              Gracias, <strong style={{ color: 'var(--ink)' }}>{form.name.split(' ')[0]}</strong>. Te escribiremos a <strong style={{ color: 'var(--ink)' }}>{form.email}</strong> lo antes posible.
            </p>
            <button className="btn btn-ghost" onClick={() => { setSent(false); setForm({ name: '', email: '', company: '', type: PROJECT_TYPES[0], message: '' }); }}>
              Enviar otro mensaje
            </button>
          </div> :
          <form className="contact-form" onSubmit={submit} noValidate>
            <div className="form-row">
              <label className="form-field">
                <span className="form-label">Nombre <span className="req">*</span></span>
                <input type="text" value={form.name} onChange={set('name')} placeholder="Ada Lovelace"
                  className={errors.name ? 'err' : ''} />
              </label>
              <label className="form-field">
                <span className="form-label">Email <span className="req">*</span></span>
                <input type="email" value={form.email} onChange={set('email')} placeholder="ada@empresa.com"
                  className={errors.email ? 'err' : ''} />
              </label>
            </div>
            <div className="form-row">
              <label className="form-field">
                <span className="form-label">Empresa</span>
                <input type="text" value={form.company} onChange={set('company')} placeholder="Opcional" />
              </label>
              <label className="form-field">
                <span className="form-label">Tipo de proyecto</span>
                <div className="select-wrap">
                  <select value={form.type} onChange={set('type')}>
                    {PROJECT_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <Icon.chev className="select-chev" />
                </div>
              </label>
            </div>
            <label className="form-field">
              <span className="form-label">Cuéntanos sobre tu proyecto <span className="req">*</span></span>
              <textarea rows="5" value={form.message} onChange={set('message')}
                placeholder="Objetivos, plazos, equipo actual, lo que ya intentaron…"
                className={errors.message ? 'err' : ''} />
            </label>
            <div className="contact-footer">
              <p className="contact-disclaimer">
                Al enviar aceptas que un humano (no un bot) lea tu mensaje y te responda por email.
              </p>
              <button type="submit" className="btn btn-primary">
                Enviar mensaje <Icon.arrow />
              </button>
            </div>
          </form>
        }
      </div>
    </section>
  );
}

  return (
    <footer className="wrap" style={{ padding: "88px 32px 48px" }}>
      <div className="footer-grid">
        <div>

            <div className="brand-mark" />
            Andrómeda
          </div>
          <p className="footer-desc">
            Agencia de desarrollo web y consultoría tecnológica potenciada por IA. Equipo remote-first construyendo producto digital desde Latinoamérica.
          </p>
        </div>
        <div className="foot-col">
          <h5>Servicios</h5>
          <a>Desarrollo a la medida</a>
          <a>Consultoría & arquitectura</a>
          <a>Modernización & integraciones</a>
          <a>Soporte y evolución</a>
        </div>
        <div className="foot-col">
          <h5>Compañía</h5>
          <a>Sobre nosotros</a>
          <a>Manifiesto técnico</a>
          <a onClick={() => smoothScrollTo('contacto')} style={{ cursor: 'pointer' }}>Contacto</a>
        </div>
        <div className="foot-col">
          <h5>Contacto</h5>
          <a>hola@andromeda.dev</a>
          <a>CDMX · Bogotá · Remote</a>
          <a>LinkedIn ↗</a>
        </div>
      </div>
      <div className="footer-bottom">
        <div>© 2026 ANDRÓMEDA STUDIO S.A. DE C.V.</div>
        <div>HECHO ENTRE GALAXIAS · LATAM</div>
      </div>
    </footer>
  );
}
